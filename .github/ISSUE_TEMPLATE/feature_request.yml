name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      placeholder: What user problem or gap does this address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - data-platform (ETL / DBT / ML)
        - api (backend / auth)
        - web (dashboard / profiles)
        - platform (infra / k8s / CI)
        - sdk
    validations:
      required: true
