name: Bug Report
description: Something is broken
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical (data loss / service down)
        - high (major feature broken)
        - medium (degraded behavior)
        - low (cosmetic / minor)
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "prod / staging / local"
